{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev-Blog</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'blog/css/style.css' %}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class = "container">
            <a class = "navbar-brand" href="{% url 'home' %}">❤️ Devblog</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Início</a>
                    </li>
                    {% for categoria in lista_categorias %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'categoria' categoria.id %}">{{ categoria.nome }}</a>
                        </li>
                    {% endfor %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'sobre' %}">Sobre</a>
                    </li>
                </ul>
            
                <form class="d-flex" method="GET" action="{% url 'home' %}">
                    <input class="form-control me-2" type="search" name="q" placeholder="Buscar..." aria-label="Search">
                    <button class="btn btn-success" type="submit">Buscar</button>
                </form>
                </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        {% block content %}

        {% endblock %}
    </main>

    <footer class="bg-light">
        <hr>
        <p>@2026 Desenvolvido por Pietro,paga nois</p>
    </footer>
</body>
</html>
